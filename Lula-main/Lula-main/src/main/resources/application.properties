spring.application.name=lula-backend

# XAMPP MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/lula_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Johannesburg&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Johannesburg

# Jackson Timezone
spring.jackson.time-zone=Africa/Johannesburg

# JWT
lula.jwt.secret=${JWT_SECRET:lula-super-secret-key-for-jwt-signing-2026-south-africa}
lula.jwt.expiration=86400000
lula.jwt.refresh-expiration=604800000

# Google OAuth
lula.google.client-id=${GOOGLE_CLIENT_ID:790839446499-2q8ir0ttrcs7jf3v00uls48bc3m3q3s2.apps.googleusercontent.com}

# CORS
lula.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost}

# Mail (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.lula=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized